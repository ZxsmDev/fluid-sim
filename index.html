<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lagrangian Fluid Sim</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        color: white;
        overflow: hidden;
        background: #191919;
        background-image: url("assets/background.png");
        backdrop-filter: brightness(0.8);
        backdrop-filter: blur(2px);
        background-size: cover;
        background-repeat: no-repeat;
        font-family: "Courier New", Courier, monospace;
      }
      canvas {
        width: 100vw;
        height: 100vh;
      }
      .navbar {
        position: absolute;
        left: 0;
        top: 0;
        width: 25%;
        display: flex;
        align-items: start;
      }
      .params-section {
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: 1rem;
        padding: 0.5rem;
        margin: 0.5rem;
        backdrop-filter: blur(5px);
        border-radius: 5px;
        border: 1px solid #5f5f5f;
        background-color: rgba(7, 7, 7, 0.8);
      }
      main {
        margin: 0;
        padding: 0;
        backdrop-filter: none;
        border: none;
        width: auto;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }
      h2 {
        margin: 0;
        font-size: medium;
      }
      ul {
        display: flex;
        flex-direction: column;
        justify-content: center;
        list-style-type: none;
        padding: 0;
        gap: 4px;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
      }
      label {
        font-size: small;
      }
      input {
        font-family: "Courier New", Courier, monospace;
        width: 50px;
        padding: 6px;
        border-radius: 5px;
      }
      button {
        background: none;
        border: none;
        color: white;
        font-weight: bolder;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
      }
      button:hover {
        color: green;
      }
      .caret {
        display: inline-block;
        transition: transform 0.3s ease;
      }
      button.collapsed .caret {
        transform: rotate(180deg);
      }
      button#reload {
        margin: 0.5rem;
        padding: 0.5rem;
        width: 2.25rem;
        height: 2.25rem;
        font-size: large;
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        border: 1px solid #5f5f5f;
        background-color: rgba(7, 7, 7, 0.8);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav class="navbar">
      <div class="params-section">
        <main>
          <header>
            <h2>Parameters:</h2>
            <button id="collapse"><span class="caret">^</span></button>
          </header>
          <!--
          SIM STEPS:
            min = 0/1
            max = inf
            place = 1
          
          SIZE:
            min = 5
            max = 50
            place = 25

          COUNT:
            min = 1
            max = 10,000
            place = 25

          ROWS:
            min = 1
            max = 100
            place = 5

          SPACING:
            min = 1
            max = 20
            place = 5
          -->
          <ul>
            <li>
              <label for="loop">Loop?</label>
              <input name="loop" type="checkbox" value="on" />
            </li>
            <li>
              <label for="step">Simulation Step</label
              ><input
                name="step"
                type="number"
                value="1"
                placeholder="1"
                min="0"
              />
            </li>
            <li>
              <label for="size">Particle Size</label>
              <input name="size" type="number" value="25" placeholder="25" min="5" max="50" />
            </li>
            <li>
              <label for="count">Particle Count</label>
              <input name="count" type="number" value="10" placeholder="10" min="1" max="10000" />
            </li>
            <li>
              <label for="rows">Spawn Rows</label>
              <input name="rows" type="number" value="5" placeholder="5" min="1" max="100" />
            </li>
             <li>
              <label for="spacing">Particle Spacing</label>
              <input name="spacing" type="number" value="5" placeholder="5" min="1" max="20" />
            </li>
          </ul>
        </main>
      </div>
      <button id="reload">⟳</button>
    </nav>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const collapse = document.getElementById("collapse");
        const params = document.querySelector("ul");

        let collapsed = true;
        params.style.display = "none";
        collapse.classList.toggle("collapsed");

        collapse.addEventListener("click", () => {
          if (collapsed) {
            params.style.display = "flex";
          } else {
            params.style.display = "none";
            window.location.reload();
          }
          collapse.classList.toggle("collapsed");
          collapsed = !collapsed;
        });

        document.getElementById("reload").addEventListener("click", () => {
          window.location.reload();
        });
      });
    </script>
    <script type="module" src="main.js"></script>
  </body>
</html>
