<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lagrangian Fluid Sim</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        color: white;
        overflow: hidden;
        background-image: url("https://static.vecteezy.com/system/resources/thumbnails/026/392/187/small_2x/black-background-with-abstract-pattern-illustration-vector.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        font-family: "Courier New", Courier, monospace;
      }
      canvas {
        width: 100vw;
        height: 100vh;
      }
      main {
        position: absolute;
        top: 0;
        left: 0;
        padding: 0.5rem;
        margin: 0.5rem 0.5rem 0 0.5rem;
        backdrop-filter: blur(5px);
        border-radius: 10px;
        border: 1px solid #5f5f5f;
        width: 20%;
        transition: all 0.5s;
      }
      h2 {
        margin: 0;
        font-size: medium;
      }
      ul {
        display: flex;
        flex-direction: column;
        justify-content: center;
        list-style-type: none;
        padding: 0;
        gap: 4px;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
      }
      label {
        font-size: small;
      }
      input {
        font-family: "Courier New", Courier, monospace;
        width: 50px;
        padding: 6px;
        border-radius: 5px;
      }
      header {
        display: flex;
        justify-content: space-between;
      }
      button {
        background: none;
        border: none;
        color: white;
        font-weight: bolder;
        text-align: center;
        cursor: pointer;
        transition: color 0.2s;
      }
      button:hover {
        color: blueviolet;
      }
      .caret {
        display: inline-block;
        transition: transform 0.3s ease;
      }
      button.collapsed .caret {
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <main>
      <header>
        <h2>Parameters:</h2>
        <button id="collapse"><span class="caret">^</span></button>
      </header>
      <ul>
        <li>
          <label for="step">Simulation Step</label
          ><input name="step" type="number" placeholder="0" min="0" />
        </li>
        <li>
          <label for="width">Particle Width</label>
          <input name="width" type="text" placeholder="200px" />
        </li>
        <li>
          <label for="height">Particle Height</label>
          <input name="height" type="text" placeholder="200px" />
        </li>
        <li>
          <label for="particleCount">Particle Count</label>
          <input name="particleCount" type="number" />
        </li>
        <li>
          <label for="particleSize">Particle Size</label>
          <input name="particleSize" type="text" placeholder="10px" />
        </li>
        <li>
          <label for="loop">Loop?</label>
          <input name="loop" type="checkbox" value="on">
        </li>
      </ul>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const collapse = document.getElementById("collapse");
        const params = document.querySelector("ul");

        let collapsed = false;

        collapse.addEventListener("click", () => {
          if (collapsed) {
            params.style.display = "flex";
          } else {
            params.style.display = "none";
          }
          collapse.classList.toggle("collapsed");
          collapsed = !collapsed;
        });
      });
    </script>
    <script type="module" src="main.js"></script>
  </body>
</html>
